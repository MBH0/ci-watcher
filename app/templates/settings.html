{% extends "base.html" %}
{% block title %}Settings — CI Watcher{% endblock %}
{% block content %}
<div class="p-8">
  <div class="max-w-3xl mx-auto">
    <div class="mb-8">
      <h1 class="text-2xl font-bold text-white">Settings</h1>
      <p class="text-f11-dim text-sm mt-1">Configuración persistente del CI Watcher</p>
    </div>

    <form method="POST" action="/settings" class="space-y-6">
      <!-- GitHub OAuth -->
      <div class="bg-f11-card border border-f11-border rounded-xl p-6 space-y-4">
        <h2 class="text-white font-semibold text-sm flex items-center gap-2">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
          GitHub OAuth
        </h2>

        <div>
          <label class="block text-xs text-white/60 font-medium mb-1.5">Client ID</label>
          <input name="github_client_id" value="{{ settings.get('github_client_id', '') }}"
                 class="w-full bg-[#0a0a0a] border border-white/10 rounded-lg px-4 py-2.5 text-white text-sm font-mono placeholder-f11-muted/50 focus:border-f11-accent/30 focus:outline-none transition-colors"
                 placeholder="Ov23lis8lqbCU3etglbd">
        </div>
        <div>
          <label class="block text-xs text-f11-muted font-medium mb-1.5">Client Secret</label>
          <input name="github_client_secret" value="{{ settings.get('github_client_secret', '') }}"
                 class="w-full bg-[#0a0a0a] border border-white/10 rounded-lg px-4 py-2.5 text-white text-sm font-mono placeholder-f11-muted/50 focus:border-f11-accent/30 focus:outline-none transition-colors"
                 placeholder="••••••••••••••••••••••" type="password">
        </div>
      </div>

      <!-- Host & Security -->
      <div class="bg-f11-card border border-f11-border rounded-xl p-6 space-y-4">
        <h2 class="text-white font-semibold text-sm flex items-center gap-2">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          Host & Seguridad
        </h2>

        <div>
          <label class="block text-xs text-f11-muted font-medium mb-1.5">Host URL</label>
          <input name="host_url" value="{{ settings.get('host_url', 'http://localhost:8010') }}"
                 class="w-full bg-[#0a0a0a] border border-white/10 rounded-lg px-4 py-2.5 text-white text-sm font-mono placeholder-f11-muted/50 focus:border-f11-accent/30 focus:outline-none transition-colors"
                 placeholder="https://tu-domain.ngrok.app">
          <p class="text-[10px] text-f11-muted/50 mt-1">URL pública para el webhook y OAuth callback</p>
        </div>
        <div>
          <label class="block text-xs text-f11-muted font-medium mb-1.5">Webhook Secret</label>
          <input name="webhook_secret" value="{{ settings.get('webhook_secret', '') }}"
                 class="w-full bg-[#0a0a0a] border border-white/10 rounded-lg px-4 py-2.5 text-white text-sm font-mono placeholder-f11-muted/50 focus:border-f11-accent/30 focus:outline-none transition-colors"
                 placeholder="auto-generado si se deja vacío">
        </div>
        <div>
          <label class="block text-xs text-f11-muted font-medium mb-1.5">JWT Secret</label>
          <input name="jwt_secret" value="{{ settings.get('jwt_secret', '') }}"
                 class="w-full bg-[#0a0a0a] border border-white/10 rounded-lg px-4 py-2.5 text-white text-sm font-mono placeholder-f11-muted/50 focus:border-f11-accent/30 focus:outline-none transition-colors"
                 placeholder="auto-generado si se deja vacío">
        </div>
        <div>
          <label class="block text-xs text-f11-muted font-medium mb-1.5">Usuarios permitidos (separados por coma)</label>
          <input name="allowed_users" value="{{ settings.get('allowed_users', '') }}"
                 class="w-full bg-[#0a0a0a] border border-white/10 rounded-lg px-4 py-2.5 text-white text-sm font-mono placeholder-f11-muted/50 focus:border-f11-accent/30 focus:outline-none transition-colors"
                 placeholder="MBH0,diegosalazar,otro">
        </div>
      </div>

      <!-- Build -->
      <div class="bg-f11-card border border-f11-border rounded-xl p-6 space-y-4">
        <h2 class="text-white font-semibold text-sm flex items-center gap-2">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="11 19 2 12 11 5 22 12 22 19"/><path d="M6 12v6a4 4 0 0 0 4 4h4a4 4 0 0 0 4-4v-6"/></svg>
          Build
        </h2>
        <div>
          <label class="block text-xs text-f11-muted font-medium mb-1.5">Directorio de builds</label>
          <input name="build_dir" value="{{ settings.get('build_dir', '/tmp/ci-builds') }}"
                 class="w-full bg-[#0a0a0a] border border-white/10 rounded-lg px-4 py-2.5 text-white text-sm font-mono placeholder-f11-muted/50 focus:border-f11-accent/30 focus:outline-none transition-colors"
                 placeholder="/tmp/ci-builds">
        </div>
      </div>

      <div class="flex items-center gap-3">
        <button type="submit" class="bg-f11-accent text-black px-6 py-2.5 rounded-lg font-semibold text-sm hover:bg-f11-accent/90 transition-all active:scale-[0.97]">
          Guardar configuración
        </button>
        <a href="/" class="text-f11-muted hover:text-white text-sm transition-colors">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
