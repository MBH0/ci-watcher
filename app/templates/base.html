<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}CI Watcher{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/output.css">
</head>
<body class="bg-f11-bg min-h-screen flex antialiased">
  {% if user %}
  <aside class="w-64 border-r border-white/[0.08] flex flex-col shrink-0 bg-[#0a0a0a]">
    <div class="h-16 flex items-center gap-3 px-6 border-b border-white/[0.08]">
      <div class="w-8 h-8 rounded-xl bg-f11-accent/20 flex items-center justify-center border border-f11-accent/20">
        <span class="text-f11-accent font-black text-sm">C</span>
      </div>
      <div>
        <span class="text-white font-bold text-sm tracking-tight">CI Watcher</span>
        <span class="text-f11-muted/50 text-[10px] block leading-none mt-0.5">Build Monitor</span>
      </div>
    </div>
    <nav class="flex-1 px-3 py-4 space-y-1.5">
      <a href="/" class="flex items-center gap-3.5 px-4 py-2.5 rounded-xl text-sm font-semibold transition-all duration-150
        {% if request.url.path == '/' or request.url.path.startswith('/builds') %}bg-f11-accent/15 text-f11-accent shadow-sm border border-f11-accent/10{% else %}text-white/70 hover:text-white hover:bg-white/[0.08]{% endif %}">
        <svg class="w-5 h-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
        <span>Builds</span>
      </a>
      <a href="/repos" class="flex items-center gap-3.5 px-4 py-2.5 rounded-xl text-sm font-semibold transition-all duration-150
        {% if request.url.path == '/repos' %}bg-f11-accent/15 text-f11-accent shadow-sm border border-f11-accent/10{% else %}text-white/70 hover:text-white hover:bg-white/[0.08]{% endif %}">
        <svg class="w-5 h-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        <span>Repos</span>
      </a>
      <a href="/settings" class="flex items-center gap-3.5 px-4 py-2.5 rounded-xl text-sm font-semibold transition-all duration-150
        {% if request.url.path == '/settings' %}bg-f11-accent/15 text-f11-accent shadow-sm border border-f11-accent/10{% else %}text-white/70 hover:text-white hover:bg-white/[0.08]{% endif %}">
        <svg class="w-5 h-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        <span>Ajustes</span>
      </a>
    </nav>
    <div class="p-4 border-t border-white/[0.08]">
      <div class="flex items-center gap-3">
        <img src="{{ user.avatar }}" alt="" class="w-8 h-8 rounded-full ring-2 ring-white/[0.06]" onerror="this.style.display='none'">
        <div class="min-w-0">
          <p class="text-white text-xs font-medium truncate leading-none mb-1">{{ user.name or user.login }}</p>
          <p class="text-f11-muted/50 text-[10px] truncate">@{{ user.login }}</p>
        </div>
        <a href="/auth/logout" class="ml-auto p-2 rounded-lg text-white/30 hover:text-white hover:bg-white/10 transition-all" title="Cerrar sesión">
          <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </a>
      </div>
    </div>
  </aside>
  {% endif %}
  <main class="flex-1 min-w-0">
    {% block content %}{% endblock %}
  </main>

  <!-- Global toast container -->
  <div id="toast-container" class="fixed bottom-6 right-6 z-50 flex flex-col gap-3 pointer-events-none"></div>

  <!-- Global SSE + Toast notifications -->
  <script>
  (function() {
    var container = document.getElementById('toast-container');
    if (!container) return;
    var evtSource = new EventSource('/api/events');

    function showToast(repo, eventType, status) {
      var colors = {
        success: 'bg-f11-success/10 border-f11-success/20 text-f11-success',
        failed: 'bg-f11-danger/10 border-f11-danger/20 text-f11-danger',
        running: 'bg-f11-warning/10 border-f11-warning/20 text-f11-warning',
        pending: 'bg-f11-muted/10 border-f11-muted/20 text-f11-muted'
      };
      var icons = { success: '✓', failed: '✗', running: '…', pending: '○' };
      var labels = {
        build_created: 'Build encolado',
        build_started: 'Build iniciado',
        build_updated: 'Build finalizado'
      };
      var color = colors[status] || colors.pending;
      var label = labels[eventType] || eventType;

      var toast = document.createElement('div');
      toast.className = 'pointer-events-auto flex items-center gap-3 px-5 py-3.5 rounded-xl border shadow-lg backdrop-blur-md transition-all duration-300 ' + color;
      toast.style.transform = 'translateX(120%)';
      toast.style.opacity = '0';
      toast.innerHTML = '<span class="text-sm font-bold">' + (icons[status] || '○') + '</span><div><p class="text-xs font-semibold">' + label + '</p><p class="text-[10px] opacity-70 truncate max-w-[260px]">' + repo + '</p></div>';

      container.appendChild(toast);
      requestAnimationFrame(function() {
        toast.style.transform = 'translateX(0)';
        toast.style.opacity = '1';
      });
      setTimeout(function() {
        toast.style.transform = 'translateX(120%)';
        toast.style.opacity = '0';
      }, 4500);
      setTimeout(function() { if (toast.parentNode) toast.remove(); }, 5000);
    }

    evtSource.addEventListener('build_created', function(e) {
      try { var d = JSON.parse(e.data); showToast(d.repo, 'build_created', d.status); } catch(e) {}
    });
    evtSource.addEventListener('build_started', function(e) {
      try { var d = JSON.parse(e.data); showToast(d.repo, 'build_started', 'running'); } catch(e) {}
    });
    evtSource.addEventListener('build_updated', function(e) {
      try { var d = JSON.parse(e.data); showToast(d.repo, 'build_updated', d.status); } catch(e) {}
    });
    evtSource.onerror = function() {};
  })();
  </script>
</body>
</html>
