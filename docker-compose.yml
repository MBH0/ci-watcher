services:
  ci-watcher:
    build: .
    container_name: ci-watcher
    restart: unless-stopped
    expose:
      - "8008"
    volumes:
      - ci_watcher_data:/data:rw
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /tmp/ci-builds:/tmp/ci-builds:rw
    networks:
      - proxy_npm
    environment:
      - DATA_DIR=/data
      - HOST_URL=${SERVICE_URL_CI_WATCHER:-${COOLIFY_URL:-http://localhost:8008}}
    env_file:
      - .env

volumes:
  ci_watcher_data:

networks:
  proxy_npm:
    external: true
